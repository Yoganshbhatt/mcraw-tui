name: Build macOS binaries
on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - name: Checkout mcraw-tui
        uses: actions/checkout@v4
        with:
          path: mcraw-tui

      - name: Checkout motioncam-decoder-rust
        uses: actions/checkout@v4
        with:
          repository: Yoganshbhatt/motioncam-decoder-rust
          path: motioncam-decoder-rust

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
        working-directory: mcraw-tui

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: mcraw-tui

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/mcraw-tui mcraw-tui-${{ matrix.target }}
          chmod +x mcraw-tui-${{ matrix.target }}
          zip mcraw-tui-${{ matrix.target }}.zip mcraw-tui-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcraw-tui-${{ matrix.target }}
          path: mcraw-tui-${{ matrix.target }}.zip
